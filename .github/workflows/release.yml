name: Release

permissions:
  contents: write

on:
  push:
    branches: [ "master" ]
    paths:
    - "data/**"
    - ".github/**"
    - "Dockerfile"
    - "Dockerfile.web"
    - "Dockerfile.console"
    - "package.json"
    - "src/**"
  workflow_dispatch:

env:
  TZ: "Asia/Shanghai"

jobs:
  # ==================== 阶段 1：数据构建 + GitHub Release ====================
  release-build:
    name: 构建数据并发布 Release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.create_release.outputs.tag_name }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 生成版本号
        id: generate_tag
        run: |
          RELEASE_TAG=$(date +'%Y.%m.%d-%H%M%S')
          echo "tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

      - name: 安装依赖并构建
        run: |
          npm install
          npm run build

      - name: 创建 GitHub Release
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ steps.generate_tag.outputs.tag }}"
          gh release create $RELEASE_TAG public/* \
            --title "Release $RELEASE_TAG" \
            --notes "自动构建发布 $RELEASE_TAG"
          echo "tag_name=$RELEASE_TAG" >> $GITHUB_OUTPUT

      - name: 清理历史 Release（保留最近 5 个）
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==================== 阶段 2：构建 Radicale 镜像 + 部署 ====================
  docker-radicale:
    name: 构建并部署 Radicale
    needs: release-build
    runs-on:
      - self-hosted
      - linux
      - arm64
      - vcards
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 构建 Docker 镜像
        run: |
          echo ">>> 构建 vcards-radicale 镜像..."
          DOCKER_BUILDKIT=1 docker build \
            --provenance=false \
            -t vcards-radicale:latest .

      - name: 确保共享卷存在
        run: |
          docker volume inspect vcards-data >/dev/null 2>&1 || docker volume create vcards-data

      - name: 停止旧容器
        run: |
          docker rm -f vcards-radicale >/dev/null 2>&1 || true

      - name: 确保网络存在
        run: |
          docker network inspect fbk-network >/dev/null 2>&1 || docker network create fbk-network

      - name: 启动新容器
        run: |
          docker run -d --name vcards-radicale \
            --restart always \
            --network fbk-network \
            -v vcards-data:/app/vcards/collection-root/cn \
            -e TZ=${TZ} \
            -e LOGS_ENDPOINT="${{ secrets.LOGS_ENDPOINT }}" \
            -e LOGS_API_KEY="${{ secrets.LOGS_API_KEY }}" \
            -e LOGS_API_SECRET="${{ secrets.LOGS_API_SECRET }}" \
            vcards-radicale:latest

      - name: 等待容器启动
        run: sleep 3

      - name: 检查容器状态
        run: |
          if ! docker ps --filter "name=vcards-radicale" --format "{{.Status}}" | grep -q "Up"; then
            echo "!!! 容器启动失败，查看日志："
            docker logs vcards-radicale 2>&1 || true
            exit 1
          fi
          echo ">>> vcards-radicale 部署成功!"

  # ==================== 阶段 3：构建 Web 页面 + 部署 ====================
  build-web:
    name: 构建并部署 Web 黄页
    needs: release-build
    runs-on:
      - self-hosted
      - linux
      - arm64
      - vcards
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 构建 Docker 镜像
        run: |
          echo ">>> 构建 vcards-web 镜像..."
          DOCKER_BUILDKIT=1 docker build \
            --provenance=false \
            -f Dockerfile.web \
            -t vcards-web:latest .

      - name: 停止旧容器
        run: |
          docker rm -f vcards-web >/dev/null 2>&1 || true

      - name: 启动新容器
        run: |
          docker run -d --name vcards-web \
            --restart always \
            --network fbk-network \
            -e TZ=${TZ} \
            vcards-web:latest

      - name: 等待容器启动
        run: sleep 3

      - name: 检查容器状态
        run: |
          if ! docker ps --filter "name=vcards-web" --format "{{.Status}}" | grep -q "Up"; then
            echo "!!! 容器启动失败，查看日志："
            docker logs vcards-web 2>&1 || true
            exit 1
          fi
          echo ">>> vcards-web 部署成功!"

  # ==================== 阶段 4：构建 Console + 部署 ====================
  build-console:
    name: 构建并部署 Console
    needs: release-build
    runs-on:
      - self-hosted
      - linux
      - arm64
      - vcards
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 构建 Console 镜像
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo ">>> 构建 vcards-console 镜像..."
          DOCKER_BUILDKIT=1 docker build \
            --provenance=false \
            --build-arg DATABASE_URL="$DATABASE_URL" \
            -f Dockerfile.console \
            -t vcards-console:latest .

      - name: 停止旧容器
        run: |
          docker rm -f vcards-console >/dev/null 2>&1 || true

      - name: 启动新容器
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          docker run -d --name vcards-console \
            --restart always \
            --network fbk-network \
            -v vcards-data:/app/vcards-data \
            -e DATABASE_URL="$DATABASE_URL" \
            -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            -e QINIU_ACCESS_KEY="${{ secrets.QINIU_ACCESS_KEY }}" \
            -e QINIU_SECRET_KEY="${{ secrets.QINIU_SECRET_KEY }}" \
            -e QINIU_IMAGE_BUCKET="${{ secrets.QINIU_IMAGE_BUCKET }}" \
            -e QINIU_FILE_BUCKET="${{ secrets.QINIU_FILE_BUCKET }}" \
            -e QINIU_REGION="${{ secrets.QINIU_REGION }}" \
            -e QINIU_IMAGE_DOMAIN="${{ secrets.QINIU_IMAGE_DOMAIN }}" \
            -e QINIU_FILE_DOMAIN="${{ secrets.QINIU_FILE_DOMAIN }}" \
            -e VCF_OUTPUT_DIR=/app/vcards-data \
            -e LOGS_ENDPOINT="${{ secrets.LOGS_ENDPOINT }}" \
            -e LOGS_API_KEY="${{ secrets.LOGS_API_KEY }}" \
            -e LOGS_API_SECRET="${{ secrets.LOGS_API_SECRET }}" \
            -e TZ=${TZ} \
            vcards-console:latest

      - name: 等待容器启动
        run: sleep 3

      - name: 检查容器状态
        run: |
          if ! docker ps --filter "name=vcards-console" --format "{{.Status}}" | grep -q "Up"; then
            echo "!!! 容器启动失败，查看日志："
            docker logs vcards-console 2>&1 || true
            exit 1
          fi
          echo ">>> vcards-console 部署成功!"
